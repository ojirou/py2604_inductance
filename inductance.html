<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>インダクタンス計算ツール</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f5f7f9;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            font-size: 1.4rem;
            color: #333;
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid #007bff;
        }
        .instruction {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 15px;
            text-align: center;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }
        .menu-item {
            padding: 15px;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            color: #495057;
        }
        .menu-item:hover {
            border-color: #007bff;
            background-color: #e7f1ff;
        }
        .menu-item.active {
            border-color: #007bff;
            background-color: #007bff;
            color: #ffffff;
        }

        .input-section {
            display: none;
            background-color: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #dee2e6;
        }
        .input-section.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .field-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #495057;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.25);
        }
        
        .calc-btn {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .calc-btn:hover {
            background-color: #218838;
        }

        .result-area {
            margin-top: 25px;
            padding: 20px;
            background-color: #fff4e5;
            border-left: 6px solid #fd7e14;
            border-radius: 4px;
            display: none;
        }
        .result-title {
            font-weight: bold;
            color: #856404;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .result-value {
            font-size: 1.2rem;
            white-space: pre-wrap;
            color: #212529;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>インダクタンス計算</h1>
    <p class="instruction">計算する種類を選択してください</p>

    <div class="menu-grid">
        <div class="menu-item" onclick="selectCalc(1, this)">1. 円形ループ (R, a: mm)</div>
        <div class="menu-item" onclick="selectCalc(2, this)">2. 矩形導線 簡易 (l, w: cm)</div>
        <div class="menu-item" onclick="selectCalc(3, this)">3. 矩形導線 詳細 (l, w, t: cm)</div>
        <div class="menu-item" onclick="selectCalc(4, this)">4. 円形導線 (l, r: cm)</div>
    </div>

    <div id="inputSection" class="input-section">
        <h3 id="selectedTitle" style="margin-top:0; margin-bottom:20px; font-size:1.1rem; color:#007bff;"></h3>
        <div id="dynamicFields"></div>
        <button class="calc-btn" onclick="executeCalculation()">計算実行</button>
    </div>

    <div id="resultArea" class="result-area">
        <div class="result-title">【計算結果】</div>
        <div id="resultValue" class="result-value"></div>
    </div>
</div>

<script>
    const MU0 = 4 * Math.PI * 1e-7;
    let currentMode = 0;

    function selectCalc(mode, element) {
        currentMode = mode;
        
        // メニューの選択状態を更新
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        // UIの初期化
        const inputSection = document.getElementById('inputSection');
        const dynamicFields = document.getElementById('dynamicFields');
        const titleArea = document.getElementById('selectedTitle');
        const resultArea = document.getElementById('resultArea');
        
        resultArea.style.display = 'none';
        inputSection.classList.add('visible');
        titleArea.innerText = element.innerText;

        let html = '';
        switch(mode) {
            case 1:
                html = createField('R_mm', 'ループ半径 R (mm)', '例: 10') +
                       createField('a_mm', '導線半径 a (mm)', '例: 0.5');
                break;
            case 2:
                html = createField('l_cm', '導線の長さ l (cm)', '例: 5') +
                       createField('w_cm', '導線の幅 w (cm)', '例: 0.2');
                break;
            case 3:
                html = createField('l_cm', '導線の長さ l (cm)', '例: 5') +
                       createField('w_cm', '導線の幅 w (cm)', '例: 0.2') +
                       createField('t_cm', '導線の厚さ t (cm)', '例: 0.01');
                break;
            case 4:
                html = createField('l_cm', '導線の長さ l (cm)', '例: 10') +
                       createField('r_cm', '導線の半径 r (cm)', '例: 0.1');
                break;
        }
        dynamicFields.innerHTML = html;
        
        // 最初の入力欄にフォーカス
        const firstInput = dynamicFields.querySelector('input');
        if(firstInput) firstInput.focus();
    }

    function createField(id, label, placeholder) {
        return `
            <div class="field-group">
                <label for="${id}">${label}</label>
                <input type="number" id="${id}" step="any" placeholder="${placeholder}">
            </div>
        `;
    }

    function executeCalculation() {
        const getVal = (id) => parseFloat(document.getElementById(id)?.value);
        let resText = "";

        if (currentMode === 1) {
            const R = getVal('R_mm');
            const a = getVal('a_mm');
            if(isNaN(R) || isNaN(a)) return alert("数値を入力してください");

            // Python: L_uh = R_mm * MU0 * (math.log(8 * R_mm / a_mm) - 2) * 1e3
            const L_uh = R * MU0 * (Math.log(8 * R / a) - 2) * 1e3;
            resText = `円形ループのインダクタンス:\n${L_uh.toFixed(4)} [μH]\n(${ (L_uh * 1e3).toFixed(4) } [nH])`;

        } else if (currentMode === 2) {
            const l = getVal('l_cm');
            const w = getVal('w_cm');
            if(isNaN(l) || isNaN(w)) return alert("数値を入力してください");

            // Python: L_uh = 0.002 * l_cm * math.log(2 * l_cm / w_cm)
            const L_uh = 0.002 * l * Math.log(2 * l / w);
            resText = `矩形導線(簡易)のインダクタンス:\n${L_uh.toFixed(4)} [μH]\n(${ (L_uh * 1e3).toFixed(4) } [nH])`;

        } else if (currentMode === 3) {
            const l = getVal('l_cm');
            const w = getVal('w_cm');
            const t = getVal('t_cm');
            if(isNaN(l) || isNaN(w) || isNaN(t)) return alert("数値を入力してください");

            // Python: L_uh = 0.002 * l_cm * (math.log(2 * l_cm / (w_cm + t_cm)) + 0.5 + 0.2235 * ((w_cm + t_cm) / l_cm))
            const L_uh = 0.002 * l * (Math.log(2 * l / (w + t)) + 0.5 + 0.2235 * ((w + t) / l));
            resText = `矩形導線(詳細)のインダクタンス:\n${L_uh.toFixed(4)} [μH]\n(${ (L_uh * 1e3).toFixed(4) } [nH])`;

        } else if (currentMode === 4) {
            const l = getVal('l_cm');
            const r = getVal('r_cm');
            if(isNaN(l) || isNaN(r)) return alert("数値を入力してください");

            // Python: L_h = (MU0 / (2 * math.pi)) * l_cm * (math.log(2 * l_cm / r_cm) - 1 + (r_cm / l_cm))
            const L_h = (MU0 / (2 * Math.PI)) * l * (Math.log(2 * l / r) - 1 + (r / l));
            resText = `円筒導線のインダクタンス:\n${(L_h * 1e6).toFixed(4)} [μH]\n(${(L_h * 1e9).toFixed(4)} [nH])`;
        }

        const resultArea = document.getElementById('resultArea');
        const resultValue = document.getElementById('resultValue');
        resultValue.innerText = resText;
        resultArea.style.display = 'block';
        
        // 結果が見えるようにスクロール
        resultArea.scrollIntoView({behavior: "smooth", block: "nearest"});
    }
</script>

</body>
</html>
